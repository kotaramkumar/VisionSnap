<svg width="320" height="620" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <!-- Phone body -->
  <rect width="320" height="620" rx="36" fill="#0D0D1A"/>

  <!-- Status bar -->
  <rect x="0" y="0" width="320" height="44" rx="36" fill="#0D0D1A"/>
  <text x="24" y="28" fill="#FFFFFF" font-size="13" font-weight="600">9:41</text>
  <text x="260" y="28" fill="#FFFFFF" font-size="13">● ▲ ■</text>

  <!-- Header -->
  <text x="160" y="90" fill="#FFFFFF" font-size="44" text-anchor="middle">👁️</text>
  <text x="160" y="122" fill="#FFFFFF" font-size="22" font-weight="800" text-anchor="middle">VisionSnap AI</text>
  <text x="160" y="142" fill="#7777AA" font-size="12" text-anchor="middle">Intelligent Image Recognition</text>

  <!-- Viewfinder box -->
  <rect x="20" y="158" width="280" height="190" rx="18" fill="#1A1A2E" stroke="#2A2A4A" stroke-width="1"/>
  <!-- Corner brackets -->
  <path d="M36 172 L36 164 L44 164" stroke="#6C63FF" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M284 172 L284 164 L276 164" stroke="#6C63FF" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M36 334 L36 342 L44 342" stroke="#6C63FF" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M284 334 L284 342 L276 342" stroke="#6C63FF" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Viewfinder content -->
  <text x="160" y="228" fill="#CCCCEE" font-size="40" text-anchor="middle">📸</text>
  <text x="160" y="268" fill="#CCCCEE" font-size="15" font-weight="600" text-anchor="middle">Scan anything around you</text>
  <text x="160" y="288" fill="#555577" font-size="12" text-anchor="middle">Leaves · Trees · Food · Veggies</text>
  <text x="160" y="304" fill="#555577" font-size="12" text-anchor="middle">Animals · Cars · People · Places</text>

  <!-- Buttons -->
  <rect x="20" y="360" width="134" height="52" rx="14" fill="#6C63FF"/>
  <text x="87" y="381" fill="#FFFFFF" font-size="18" text-anchor="middle">📷</text>
  <text x="87" y="400" fill="#FFFFFF" font-size="14" font-weight="700" text-anchor="middle">Camera</text>

  <rect x="166" y="360" width="134" height="52" rx="14" fill="#1A1A2E" stroke="#2A2A4A" stroke-width="1"/>
  <text x="233" y="381" fill="#FFFFFF" font-size="18" text-anchor="middle">🖼️</text>
  <text x="233" y="400" fill="#FFFFFF" font-size="14" font-weight="700" text-anchor="middle">Gallery</text>

  <!-- Category chips label -->
  <text x="20" y="436" fill="#555577" font-size="10" font-weight="700" letter-spacing="1">SUPPORTED CATEGORIES</text>

  <!-- Chips row 1 -->
  <rect x="20" y="446" width="82" height="30" rx="15" fill="#1A1A2E" stroke="#2A2A4A" stroke-width="1"/>
  <text x="60" y="466" fill="#9999BB" font-size="12" text-anchor="middle">🍃 Leaves</text>

  <rect x="110" y="446" width="72" height="30" rx="15" fill="#1A1A2E" stroke="#2A2A4A" stroke-width="1"/>
  <text x="146" y="466" fill="#9999BB" font-size="12" text-anchor="middle">🌳 Trees</text>

  <rect x="190" y="446" width="56" height="30" rx="15" fill="#1A1A2E" stroke="#2A2A4A" stroke-width="1"/>
  <text x="218" y="466" fill="#9999BB" font-size="12" text-anchor="middle">🥦 Veg</text>

  <rect x="254" y="446" width="50" height="30" rx="15" fill="#1A1A2E" stroke="#2A2A4A" stroke-width="1"/>
  <text x="279" y="466" fill="#9999BB" font-size="12" text-anchor="middle">🍔 Food</text>

  <!-- Chips row 2 -->
  <rect x="20" y="484" width="88" height="30" rx="15" fill="#1A1A2E" stroke="#2A2A4A" stroke-width="1"/>
  <text x="64" y="504" fill="#9999BB" font-size="12" text-anchor="middle">🐾 Animals</text>

  <rect x="116" y="484" width="62" height="30" rx="15" fill="#1A1A2E" stroke="#2A2A4A" stroke-width="1"/>
  <text x="147" y="504" fill="#9999BB" font-size="12" text-anchor="middle">🚗 Cars</text>

  <rect x="186" y="484" width="66" height="30" rx="15" fill="#1A1A2E" stroke="#2A2A4A" stroke-width="1"/>
  <text x="219" y="504" fill="#9999BB" font-size="12" text-anchor="middle">👤 People</text>

  <rect x="260" y="484" width="44" height="30" rx="15" fill="#1A1A2E" stroke="#2A2A4A" stroke-width="1"/>
  <text x="282" y="504" fill="#9999BB" font-size="12" text-anchor="middle">🏛️ ...</text>

  <!-- Bottom tab bar -->
  <rect x="0" y="554" width="320" height="66" rx="0" fill="#1A1A2E"/>
  <rect x="0" y="554" width="320" height="1" fill="#2A2A4A"/>

  <text x="80" y="578" fill="#6C63FF" font-size="20" text-anchor="middle">📷</text>
  <text x="80" y="596" fill="#6C63FF" font-size="10" font-weight="700" text-anchor="middle">Scan</text>

  <text x="160" y="578" fill="#555577" font-size="20" text-anchor="middle">📋</text>
  <text x="160" y="596" fill="#555577" font-size="10" text-anchor="middle">History</text>

  <text x="240" y="578" fill="#555577" font-size="20" text-anchor="middle">⚙️</text>
  <text x="240" y="596" fill="#555577" font-size="10" text-anchor="middle">Settings</text>
</svg>
