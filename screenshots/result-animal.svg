<svg width="320" height="620" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <rect width="320" height="620" rx="36" fill="#0D0D1A"/>

  <!-- Status bar -->
  <text x="24" y="28" fill="#FFFFFF" font-size="13" font-weight="600">9:41</text>
  <text x="260" y="28" fill="#FFFFFF" font-size="13">● ▲ ■</text>

  <!-- Top bar -->
  <rect x="20" y="50" width="40" height="40" rx="20" fill="#1A1A2E" stroke="#2A2A4A" stroke-width="1"/>
  <text x="40" y="76" fill="#FFFFFF" font-size="20" text-anchor="middle">←</text>
  <text x="160" y="76" fill="#FFFFFF" font-size="16" font-weight="700" text-anchor="middle">Scan Result</text>

  <!-- Hero image placeholder -->
  <rect x="20" y="102" width="280" height="130" rx="16" fill="#1A1A2E"/>
  <text x="160" y="175" fill="#555577" font-size="48" text-anchor="middle">🦁</text>

  <!-- Badge -->
  <rect x="20" y="244" width="174" height="30" rx="15" fill="#FF703322" stroke="#FF703366" stroke-width="1"/>
  <text x="36" y="264" fill="#FF7033" font-size="14">🐾</text>
  <text x="56" y="264" fill="#FF7033" font-size="12" font-weight="700">Animal</text>
  <text x="104" y="264" fill="#444466" font-size="12">·</text>
  <text x="114" y="264" fill="#FF7033BB" font-size="11">high confidence</text>

  <!-- Title -->
  <text x="20" y="295" fill="#FFFFFF" font-size="22" font-weight="800">African Lion</text>

  <!-- Divider -->
  <rect x="20" y="308" width="280" height="1" fill="#2A2A4A"/>

  <!-- Info cards -->
  <rect x="20" y="318" width="280" height="52" rx="12" fill="#1A1A2E" stroke="#2A2A4A" stroke-width="1"/>
  <text x="34" y="336" fill="#7777AA" font-size="9" font-weight="700" letter-spacing="0.8">SCIENTIFIC NAME</text>
  <text x="34" y="356" fill="#DDDDEE" font-size="13" font-style="italic">Panthera leo</text>

  <rect x="20" y="378" width="280" height="52" rx="12" fill="#1A1A2E" stroke="#2A2A4A" stroke-width="1"/>
  <text x="34" y="396" fill="#7777AA" font-size="9" font-weight="700" letter-spacing="0.8">HABITAT</text>
  <text x="34" y="416" fill="#DDDDEE" font-size="13">Savannas &amp; grasslands, sub-Saharan Africa</text>

  <rect x="20" y="438" width="135" height="52" rx="12" fill="#1A1A2E" stroke="#2A2A4A" stroke-width="1"/>
  <text x="34" y="456" fill="#7777AA" font-size="9" font-weight="700" letter-spacing="0.8">LIFESPAN</text>
  <text x="34" y="476" fill="#DDDDEE" font-size="13">10–14 years</text>

  <rect x="165" y="438" width="135" height="52" rx="12" fill="#1A1A2E" stroke="#2A2A4A" stroke-width="1"/>
  <text x="179" y="456" fill="#7777AA" font-size="9" font-weight="700" letter-spacing="0.8">CONSERVATION</text>
  <text x="179" y="476" fill="#DDDDEE" font-size="13">Vulnerable</text>

  <!-- Fun facts card -->
  <rect x="20" y="498" width="280" height="80" rx="12" fill="#1A1A2E" stroke="#2A2A4A" stroke-width="1"/>
  <text x="34" y="516" fill="#7777AA" font-size="9" font-weight="700" letter-spacing="0.8">💡  FUN FACTS</text>
  <text x="34" y="536" fill="#6C63FF" font-size="14">•</text>
  <text x="46" y="536" fill="#CCCCEE" font-size="12">Only truly social big cats</text>
  <text x="34" y="554" fill="#6C63FF" font-size="14">•</text>
  <text x="46" y="554" fill="#CCCCEE" font-size="12">Roar heard up to 8 km away</text>
  <text x="34" y="572" fill="#6C63FF" font-size="14">•</text>
  <text x="46" y="572" fill="#CCCCEE" font-size="12">Females do 90% of hunting</text>

  <!-- Bottom tab bar -->
  <rect x="0" y="554" width="320" height="66" rx="0" fill="#1A1A2E"/>
  <rect x="0" y="554" width="320" height="1" fill="#2A2A4A"/>
  <text x="80" y="578" fill="#6C63FF" font-size="20" text-anchor="middle">📷</text>
  <text x="80" y="596" fill="#6C63FF" font-size="10" font-weight="700" text-anchor="middle">Scan</text>
  <text x="160" y="578" fill="#555577" font-size="20" text-anchor="middle">📋</text>
  <text x="160" y="596" fill="#555577" font-size="10" text-anchor="middle">History</text>
  <text x="240" y="578" fill="#555577" font-size="20" text-anchor="middle">⚙️</text>
  <text x="240" y="596" fill="#555577" font-size="10" text-anchor="middle">Settings</text>
</svg>
